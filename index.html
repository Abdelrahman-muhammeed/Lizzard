<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sound Button</title>

    <style>
      /* 1. Make the whole page light purple and center everything */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #d8b4f8; /* light purple */
      }

      /* 2. Style the button */
      #soundBtn {
        width: 110px;
       height: 110px;
        border-radius: 50%;
        border: none;
        background: radial-gradient(circle, #a855f7, #7c3aed);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: all 0.15s ease;
        }
        #soundBtn:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 25px rgba(0,0,0,0.3);
}
#soundBtn:active {
  transform: scale(0.95);
}

      /* 3. Small click animation */
      #soundBtn:active {
        transform: scale(0.9);
      }
    </style>
  </head>
  <body>
    <!-- The button -->
    <button id="soundBtn"></button>

    <script>
      // 4. Get the button from HTML
      const button = document.getElementById("soundBtn");

      // 5. Add click event
      button.addEventListener("click", () => {

  // 🔊 Play sound (same as before)
  new Audio("sound.mp3").play();

  // 🦎 Create text element
  const word = document.createElement("div");
  word.innerText = "🦎";

  // 🎨 Style it
  word.style.position = "absolute";
  word.style.color = "green";
  word.style.fontSize = "20px";
  word.style.fontWeight = "bold";

  // 🎯 Random position
  word.style.left = Math.random() * window.innerWidth + "px";
  word.style.top = Math.random() * window.innerHeight + "px";

  // 🧱 Add to page
  document.body.appendChild(word);
});
  
    </script>
  </body>
</html>
